<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="stylesheet" href="./styles/styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@100..900&display=swap" rel="stylesheet">
  
  <script defer src="./js/app.js"></script>
  <title>Frontend Mentor | Calculator app</title>
  <style>
    .attribution { font-size: 11px; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }
  </style>
</head>
<body>
  <main class="designThemeOne" id="calculator-container">
    <div class="appTitle">
    <h1>calc</h1>
  </div>
  <div class="themeIdentifier">
    <h5>THEME</h5>
    <div class="themeControl">
      <div class="themeLabels">
        <label for="themeOneDial">1</label>
        <label for="themeTwoDial">2</label>
        <label for="themeThreeDial">3</label>
      </div>

      <div class="themeSwitch">
        <input type="radio" name="theme" id="themeOneDial" value="designThemeOne" checked>
        <input type="radio" name="theme" id="themeTwoDial" value="designThemeTwo">
        <input type="radio" name="theme" id="themeThreeDial" value="designThemeThree">
      </div>
    </div>
  </div>
  <div class="calculatorScreen">
    <h2 id="screen">0</h2>
  </div>
  <div class="calculatorButtonsContainer">
    <button class="btn" id="7">7</button>
    <button class="btn" id="8">8</button>
    <button class="btn" id="9">9</button>
    <button class="btn dontPrint" id="del">DEL</button>
    <button class="btn" id="4">4</button>
    <button class="btn" id="5">5</button>
    <button class="btn" id="6">6</button>
    <button class="btn" id="+">+</button>
    <button class="btn" id="1">1</button>
    <button class="btn" id="2">2</button>
    <button class="btn" id="3">3</button>
    <button class="btn" id="-">-</button>
    <button class="btn" id=".">.</button>
    <button class="btn" id="0">0</button>
    <button class="btn" id="/">/</button>
    <button class="btn" id="*">x</button>
    <button class="btn resetBtn dontPrint" id="reset">RESET</button>
    <button class="btn equalToBtn" id="=">=</button>
  </div>
  </main>
  
    <div class="attribution hide">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>. 
    Coded by <a href="#">Your Name Here</a>.
  </div>
</body>
</html>
